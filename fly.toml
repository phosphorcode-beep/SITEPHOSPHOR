# fly.toml — configuração de deploy do site Phosphor
# Docs: https://fly.io/docs/reference/configuration/

app = "site-phosphor"
primary_region = "gru"  # São Paulo, Brasil

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[env]
  NODE_ENV = "production"
  NEXT_TELEMETRY_DISABLED = "1"
